[package]
name = "fast-nix-gc"
version = "0.1.0"
edition = "2024"

[dependencies]
pico-args = "0.5"
rayon = "1"
walkdir = "2"
anyhow = "1"
nix = { version = "0.31", features = ["fs", "user", "dir", "mount"] }
chrono = "0.4"
log = "0.4"
env_logger = "0.11"
rusqlite = { version = "0.39", features = ["bundled"] }
foldhash = "0.2"
libc = "0.2"

[dev-dependencies]
tempfile = "3"
libc = "0.2"
rusqlite = { version = "0.39", features = ["bundled"] }
proptest = "1"

[[bench]]
name = "gc_bench"
harness = false

[profile.release]
lto = true
codegen-units = 1

[profile.profiling]
inherits = "release"
debug = true
strip = false

